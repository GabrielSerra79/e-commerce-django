{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block conteudo %}
    <div class="row">
        <div class="col-lg">
            <h2>Login</h2>
        </div>
        <div class="col-lg">
            <h2>Cadastro</h2>
            <form method="POST" action="">
                {% csrf_token %}
                {{ userform|crispy }}
                {% comment %} {{ perfilform|crispy }} {% endcomment %}
                <div class="row">
                    <div class="col">
                        <button type="submit" class="btn btn-primary btn-block btn-lg">
                            Enviar
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
{% endblock conteudo %}
